<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Dračí Abeceda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    /* ── SKY BACKGROUND ── */
    #bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #87CEEB 0%, #b8e4f7 55%, #d4f0a0 100%);
      z-index: 0;
    }

    /* clouds */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.85;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    #c1 { width:120px; height:38px; top:6%; left:5%; animation: drift 28s linear infinite; }
    #c1::before { width:60px; height:55px; top:-28px; left:18px; }
    #c1::after  { width:45px; height:42px; top:-20px; left:55px; }

    #c2 { width:90px; height:30px; top:12%; left:60%; animation: drift 22s linear infinite 4s; }
    #c2::before { width:45px; height:42px; top:-22px; left:12px; }
    #c2::after  { width:35px; height:32px; top:-15px; left:42px; }

    #c3 { width:140px; height:42px; top:4%; left:78%; animation: drift 32s linear infinite 10s; }
    #c3::before { width:70px; height:62px; top:-32px; left:20px; }
    #c3::after  { width:55px; height:50px; top:-24px; left:70px; }

    #c4 { width:80px; height:26px; top:20%; left:35%; animation: drift 19s linear infinite 7s; }
    #c4::before { width:40px; height:38px; top:-20px; left:10px; }
    #c4::after  { width:30px; height:28px; top:-14px; left:38px; }

    @keyframes drift {
      from { transform: translateX(0); }
      to   { transform: translateX(-110vw); }
    }

    /* mountains */
    #mountains {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 38%;
      z-index: 1;
      pointer-events: none;
    }

    /* ── DRAGONS ── */
    .dragon {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }
    #dragon-left  { left: -10px; bottom: 28%; width: 120px; animation: hover1 4s ease-in-out infinite; }
    #dragon-right { right: -10px; bottom: 32%; width: 110px; animation: hover2 5s ease-in-out infinite; transform: scaleX(-1); }
    #dragon-top   { top: 2%; right: 18%; width: 80px; animation: fly 18s linear infinite; }

    @keyframes hover1 {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-18px); }
    }
    @keyframes hover2 {
      0%,100% { transform: scaleX(-1) translateY(0); }
      50%      { transform: scaleX(-1) translateY(-14px); }
    }
    @keyframes fly {
      0%   { transform: translateX(0) translateY(0) scaleX(1); opacity:1; }
      48%  { transform: translateX(-60vw) translateY(15px) scaleX(1); opacity:1; }
      50%  { transform: translateX(-62vw) translateY(15px) scaleX(-1); opacity:0.8; }
      100% { transform: translateX(0) translateY(0) scaleX(-1); opacity:1; }
    }

    /* stars / sparkles */
    .sparkle {
      position: fixed;
      width: 8px; height: 8px;
      background: #FFD700;
      clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      animation: twinkle 2.5s ease-in-out infinite;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes twinkle {
      0%,100% { opacity:0.2; transform: scale(0.8); }
      50%      { opacity:1;   transform: scale(1.3); }
    }

    /* ── GAME UI ── */
    #game {
      position: relative;
      z-index: 10;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 20px);
      gap: 0;
    }

    /* top bar */
    #top-bar {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.9);
    }
    .bar-item { font-size: 17px; font-weight: 600; color: #2a4a6b; }
    .bar-label { font-size: 12px; font-weight: 500; color: #5a7a9b; display: block; }

    /* progress bar */
    #progress-wrap {
      width: 100%;
      max-width: 600px;
      padding: 0 4px;
    }
    #progress-track {
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.8);
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      border-radius: 5px;
      transition: width 0.5s ease;
    }

    /* prompt */
    #prompt-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #prompt-label {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      letter-spacing: 0.3px;
    }

    /* word picture card */
    #word-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2.5px solid rgba(255,255,255,0.95);
      border-radius: 22px;
      padding: 10px 24px 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.13);
      min-width: 160px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    #word-card.hidden { opacity: 0; transform: scale(0.85); pointer-events: none; }
    #word-emoji { font-size: 52px; line-height: 1.1; }
    #word-label {
      font-size: 18px;
      font-weight: 700;
      color: #2a4a6b;
      letter-spacing: 0.5px;
      filter: blur(6px);
      transition: filter 0.5s ease;
      user-select: none;
    }
    #word-label.revealed {
      filter: blur(0);
    }

    #replay-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: transform 0.12s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    #replay-btn:active { transform: scale(0.9); }

    /* letter buttons */
    #choices {
      display: flex;
      gap: 20px;
      justify-content: center;
      width: 100%;
      max-width: 600px;
      padding: 0 8px;
    }
    .letter-btn {
      flex: 1;
      max-width: 240px;
      aspect-ratio: 1 / 1.15;
      border-radius: 28px;
      border: 3px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: clamp(80px, 18vw, 140px);
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a4a6b;
      transition: transform 0.12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,1);
    }
    .letter-btn:active { transform: scale(0.94); }
    .letter-btn.correct {
      background: rgba(200,240,160,0.95);
      border-color: #4CAF50;
      color: #2d6a2d;
      animation: pop 0.4s ease;
    }
    .letter-btn.wrong {
      background: rgba(255,200,200,0.95);
      border-color: #E24B4A;
      color: #8b1a1a;
      animation: shake 0.4s ease;
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-12px); }
      75%      { transform: translateX(12px); }
    }

    /* feedback */
    #feedback {
      font-size: 26px;
      font-weight: 700;
      min-height: 38px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* ── WIN SCREEN ── */
    #win-screen {
      display: none;
      position: relative;
      z-index: 10;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      padding: 2rem 1.5rem;
      height: 100dvh;
      justify-content: center;
      text-align: center;
    }
    #win-screen .trophy { font-size: 90px; animation: bounce 1s ease infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-16px); } }
    #win-screen h2 {
      font-size: 38px; font-weight: 800; color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }
    #win-screen p {
      font-size: 20px; color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #restart-btn {
      padding: 18px 50px;
      border-radius: 20px;
      border: 3px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.85);
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      color: #2a4a6b;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      -webkit-tap-highlight-color: transparent;
    }
    #restart-btn:active { transform: scale(0.96); }

    /* confetti */
    #confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }
    .conf {
      position: absolute;
      width: 11px; height: 15px;
      border-radius: 3px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(740deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ── BACKGROUND ── -->

  <div class="cloud" id="c1"></div>
  <div class="cloud" id="c2"></div>
  <div class="cloud" id="c3"></div>
  <div class="cloud" id="c4"></div>
</div>

<!-- ── GAME ── -->
<div id="game">
  <div id="top-bar">
    <div>
      <span class="bar-label">Skóre</span>
      <span class="bar-item" id="score-val">0</span>
    </div>
    <div style="text-align:center;">
      <span class="bar-label">Dračí Abeceda</span>
      <span class="bar-item" style="font-size:20px;">🐉</span>
    </div>
    <div style="text-align:right;">
      <span class="bar-label">Písmeno</span>
      <span class="bar-item"><span id="round-num">1</span>/26</span>
    </div>
  </div>

  <div id="progress-wrap">
    <div id="progress-track">
      <div id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="prompt-area">
    <div id="prompt-label">Kde je toto písmeno?</div>
    <div id="word-card" class="hidden">
      <div id="word-emoji">🐉</div>
      <div id="word-label">Drak</div>
    </div>
    <button id="replay-btn" title="Znovu přehrát">🔊</button>
  </div>

  <div id="choices">
    <button class="letter-btn" id="btn0"></button>
    <button class="letter-btn" id="btn1"></button>
  </div>

  <div id="feedback">&nbsp;</div>
</div>

<!-- ── WIN ── -->
<div id="win-screen">
  <div class="trophy">🏆</div>
  <h2>Výborně, hrdino!</h2>
  <p>Znáš všechna písmena abecedy!</p>
  <p style="font-size:16px; margin-top:-8px;">Draci jsou na tebe pyšní! 🐉❤️</p>
  <button id="restart-btn">Hrát znovu</button>
</div>

<script>
const LETTERS = [
  { letter:'A', word:'Auto',    phoneme:'á',        emoji:'🚗' },
  { letter:'B', word:'Bota',    phoneme:'bé',       emoji:'👟' },
  { letter:'C', word:'Cukr',    phoneme:'cé',       emoji:'🍬' },
  { letter:'D', word:'Dům',     phoneme:'dé',       emoji:'🏠' },
  { letter:'E', word:'Eva',     phoneme:'é',        emoji:'👧' },
  { letter:'F', word:'Fén',     phoneme:'ef',       emoji:'💨' },
  { letter:'G', word:'Guma',    phoneme:'gé',       emoji:'✏️' },
  { letter:'H', word:'Had',     phoneme:'há',       emoji:'🐍' },
  { letter:'I', word:'Iva',     phoneme:'í',        emoji:'👩' },
  { letter:'J', word:'Jablko',  phoneme:'jé',       emoji:'🍎' },
  { letter:'K', word:'Kolo',    phoneme:'ká',       emoji:'🚲' },
  { letter:'L', word:'Lopata',  phoneme:'el',       emoji:'🪣' },
  { letter:'M', word:'Máma',    phoneme:'em',       emoji:'👩‍👧' },
  { letter:'N', word:'Nos',     phoneme:'en',       emoji:'👃' },
  { letter:'O', word:'Oko',     phoneme:'ó',        emoji:'👁️' },
  { letter:'P', word:'Pes',     phoneme:'pé',       emoji:'🐶' },
  { letter:'Q', word:'Quido',   phoneme:'kvé',      emoji:'🧑' },
  { letter:'R', word:'Ruka',    phoneme:'er',       emoji:'✋' },
  { letter:'S', word:'Sůl',     phoneme:'es',       emoji:'🧂' },
  { letter:'T', word:'Táta',    phoneme:'té',       emoji:'👨' },
  { letter:'U', word:'Ucho',    phoneme:'ú',        emoji:'👂' },
  { letter:'V', word:'Voda',    phoneme:'vé',       emoji:'💧' },
  { letter:'W', word:'Watt',    phoneme:'dvojité vé', emoji:'💡' },
  { letter:'X', word:'Xylofon', phoneme:'iks',      emoji:'🎵' },
  { letter:'Y', word:'Yoga',    phoneme:'ypsilon',  emoji:'🧘' },
  { letter:'Z', word:'Zuby',    phoneme:'zet',      emoji:'🦷' },
];

let queue=[], currentTarget=null, score=0, round=0, canAnswer=false;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* Speak a single utterance, return a promise that resolves when done */
function speakOne(text, rate, pitch){
  return new Promise(resolve => {
    if(!window.speechSynthesis){ setTimeout(resolve, 600); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'cs-CZ';
    u.rate  = rate  || 0.78;
    u.pitch = pitch || 1.05;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

/* Full intro sequence: word → pause → show card → letter × 2 with long pause */
async function speakTarget(){
  if(!currentTarget) return;
  speechSynthesis.cancel();

  const card  = document.getElementById('word-card');
  const emoji = document.getElementById('word-emoji');
  const label = document.getElementById('word-label');

  card.classList.add('hidden');

  /* 1. Say the full word slowly */
  await speakOne(currentTarget.word, 0.72, 1.05);
  await wait(300);

  /* 2. Show the picture card */
  emoji.textContent = currentTarget.emoji;
  label.textContent = currentTarget.word;
  card.classList.remove('hidden');
  await wait(600);

  /* 3. Say the letter name — first time */
  await speakOne(currentTarget.phoneme, 0.65, 1.1);
  await wait(1100);

  /* 4. Say the letter name — second time */
  await speakOne(currentTarget.phoneme, 0.65, 1.1);

  canAnswer = true;
}

function nextRound(){
  if(queue.length===0){ showWin(); return; }
  canAnswer=false;
  currentTarget=queue.shift();
  round++;
  document.getElementById('round-num').textContent=round;
  document.getElementById('progress-fill').style.width=((round-1)/26*100)+'%';
  document.getElementById('feedback').innerHTML='&nbsp;';
  document.getElementById('word-card').classList.add('hidden');
  document.getElementById('word-label').classList.remove('revealed');

  const decoy=getDecoy(currentTarget);
  const opts=shuffle([currentTarget,decoy]);
  ['btn0','btn1'].forEach((id,i)=>{
    const btn=document.getElementById(id);
    btn.textContent=opts[i].letter;
    btn.dataset.letter=opts[i].letter;
    btn.className='letter-btn';
  });

  setTimeout(()=>{ speakTarget(); }, 500);
}

function getDecoy(target){
  const pool=LETTERS.filter(l=>l.letter!==target.letter);
  const similar=getSimilar(target.letter);
  const candidates=similar.length?similar:pool;
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function getSimilar(letter){
  const groups=[
    ['B','D','P'],['M','N'],['C','G','O'],['F','E'],['I','J','L'],
    ['S','Z'],['T','I'],['U','V'],['K','X'],['A','H'],['R','K'],
  ];
  const group=groups.find(g=>g.includes(letter));
  if(!group) return [];
  return group.filter(l=>l!==letter).map(l=>LETTERS.find(x=>x.letter===l)).filter(Boolean);
}

async function handleAnswer(chosenLetter){
  if(!canAnswer) return;
  canAnswer=false;
  speechSynthesis.cancel();

  const btns=document.querySelectorAll('.letter-btn');
  const correct=chosenLetter===currentTarget.letter;

  btns.forEach(btn=>{
    if(btn.dataset.letter===currentTarget.letter) btn.classList.add('correct');
    else if(btn.dataset.letter===chosenLetter&&!correct) btn.classList.add('wrong');
  });

  if(correct){
    score++;
    document.getElementById('score-val').textContent=score;
    document.getElementById('feedback').textContent='Výborně! 🌟';
    document.getElementById('word-label').classList.add('revealed');
    launchConfetti();
    await speakOne('Výborně!', 0.82, 1.15);
    await wait(200);
    await speakOne(currentTarget.letter, 0.65, 1.1);
    await wait(200);
    await speakOne(currentTarget.word, 0.75, 1.05);
    setTimeout(nextRound, 600);
  } else {
    document.getElementById('feedback').textContent='Zkus znovu! 💪';
    await speakOne('Zkus to znovu.', 0.78, 1.05);
    await wait(400);
    setTimeout(()=>{
      btns.forEach(btn=>btn.className='letter-btn');
      speakTarget();
    }, 300);
  }
}

function launchConfetti(){
  const layer=document.getElementById('confetti-layer');
  const colors=['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517','#FFD700','#FF69B4'];
  for(let i=0;i<45;i++){
    const c=document.createElement('div');
    c.className='conf';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(0.9+Math.random()*1.3)+'s';
    c.style.animationDelay=(Math.random()*0.5)+'s';
    layer.appendChild(c);
    c.addEventListener('animationend',()=>c.remove());
  }
}

async function showWin(){
  document.getElementById('game').style.display='none';
  document.getElementById('win-screen').style.display='flex';
  launchConfetti();
  setTimeout(launchConfetti,700);
  setTimeout(launchConfetti,1400);
  await speakOne('Výborně, hrdino!', 0.78, 1.1);
  await wait(300);
  await speakOne('Znáš všechna písmena abecedy!', 0.75, 1.05);
  await wait(300);
  await speakOne('Draci jsou na tebe pyšní!', 0.75, 1.05);
}

function init(){
  queue=shuffle(LETTERS); score=0; round=0;
  document.getElementById('score-val').textContent='0';
  document.getElementById('round-num').textContent='1';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('word-card').classList.add('hidden');
  document.getElementById('word-label').classList.remove('revealed');
  document.getElementById('game').style.display='flex';
  document.getElementById('win-screen').style.display='none';
  nextRound();
}

document.getElementById('replay-btn').addEventListener('click', ()=>{ speechSynthesis.cancel(); speakTarget(); });
document.getElementById('btn0').addEventListener('click',()=>handleAnswer(document.getElementById('btn0').dataset.letter));
document.getElementById('btn1').addEventListener('click',()=>handleAnswer(document.getElementById('btn1').dataset.letter));
document.getElementById('restart-btn').addEventListener('click',init);

init();
</script>
</body>
</html>
