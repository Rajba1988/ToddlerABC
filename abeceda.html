<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Abeceda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
    }
    #game {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      gap: 1.5rem;
    }
    #score-bar {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      font-size: 15px;
      color: #666;
    }
    #score-val { font-weight: 600; color: #1a1a1a; }
    #prompt-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    #prompt-label {
      font-size: 17px;
      color: #555;
    }
    #replay-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1.5px solid #ddd;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    #replay-btn:active { transform: scale(0.93); }
    #choices {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 0.5rem;
    }
    .letter-btn {
      width: 140px; height: 170px;
      border-radius: 24px;
      border: 2px solid #e0e0e0;
      background: #fff;
      font-size: 88px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
      transition: transform 0.12s, border-color 0.12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .letter-btn:active { transform: scale(0.95); }
    .letter-btn.correct {
      background: #EAF3DE;
      border-color: #639922;
      color: #3B6D11;
      animation: pop 0.35s ease;
    }
    .letter-btn.wrong {
      background: #FCEBEB;
      border-color: #E24B4A;
      color: #A32D2D;
      animation: shake 0.35s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    #feedback {
      font-size: 24px;
      font-weight: 600;
      min-height: 36px;
      color: #1a1a1a;
      text-align: center;
    }
    #progress-wrap {
      width: 100%;
      max-width: 420px;
    }
    #progress-track {
      height: 7px;
      background: #ebebeb;
      border-radius: 4px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: #639922;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    #confetti-layer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }
    .conf {
      position: absolute;
      width: 10px; height: 14px;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    #win-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      padding: 3rem 1rem;
      text-align: center;
      min-height: 100dvh;
      justify-content: center;
    }
    #win-screen .trophy { font-size: 80px; }
    #win-screen h2 { font-size: 32px; font-weight: 700; color: #1a1a1a; }
    #win-screen p { font-size: 17px; color: #666; }
    #restart-btn {
      margin-top: 0.5rem;
      padding: 16px 44px;
      border-radius: 16px;
      border: 1.5px solid #ddd;
      background: #fff;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      color: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      -webkit-tap-highlight-color: transparent;
    }
    #restart-btn:active { transform: scale(0.97); }

    @media (max-width: 380px) {
      .letter-btn { width: 120px; height: 148px; font-size: 72px; }
      #choices { gap: 1.25rem; }
    }
  </style>
</head>
<body>

<div id="confetti-layer"></div>

<div id="game">
  <div id="score-bar">
    <span>Skóre: <span id="score-val">0</span></span>
    <span>Písmeno <span id="round-num">1</span> / 26</span>
  </div>

  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="prompt-area">
    <div id="prompt-label">Kde je písmeno?</div>
    <button id="replay-btn" title="Znovu přehrát">🔊</button>
  </div>

  <div id="choices">
    <button class="letter-btn" id="btn0"></button>
    <button class="letter-btn" id="btn1"></button>
  </div>

  <div id="feedback"></div>
</div>

<div id="win-screen">
  <div class="trophy">🏆</div>
  <h2>Výborně!</h2>
  <p>Znáš všechna písmena abecedy!</p>
  <button id="restart-btn">Hrát znovu</button>
</div>

<script>
const LETTERS = [
  { letter: 'A', word: 'Auto',    phoneme: 'á' },
  { letter: 'B', word: 'Bota',    phoneme: 'bé' },
  { letter: 'C', word: 'Cukr',    phoneme: 'cé' },
  { letter: 'D', word: 'Dům',     phoneme: 'dé' },
  { letter: 'E', word: 'Eva',     phoneme: 'é' },
  { letter: 'F', word: 'Fén',     phoneme: 'ef' },
  { letter: 'G', word: 'Guma',    phoneme: 'gé' },
  { letter: 'H', word: 'Had',     phoneme: 'há' },
  { letter: 'I', word: 'Iva',     phoneme: 'í' },
  { letter: 'J', word: 'Jablko',  phoneme: 'jé' },
  { letter: 'K', word: 'Kolo',    phoneme: 'ká' },
  { letter: 'L', word: 'Lopata',  phoneme: 'el' },
  { letter: 'M', word: 'Máma',    phoneme: 'em' },
  { letter: 'N', word: 'Nos',     phoneme: 'en' },
  { letter: 'O', word: 'Oko',     phoneme: 'ó' },
  { letter: 'P', word: 'Pes',     phoneme: 'pé' },
  { letter: 'Q', word: 'Quido',   phoneme: 'kvé' },
  { letter: 'R', word: 'Ruka',    phoneme: 'er' },
  { letter: 'S', word: 'Sůl',     phoneme: 'es' },
  { letter: 'T', word: 'Táta',    phoneme: 'té' },
  { letter: 'U', word: 'Ucho',    phoneme: 'ú' },
  { letter: 'V', word: 'Voda',    phoneme: 'vé' },
  { letter: 'W', word: 'Watt',    phoneme: 'dvojité vé' },
  { letter: 'X', word: 'Xylofon', phoneme: 'iks' },
  { letter: 'Y', word: 'Yoga',    phoneme: 'ypsilon' },
  { letter: 'Z', word: 'Zuby',    phoneme: 'zet' },
];

let queue = [], currentTarget = null, score = 0, round = 0;
let canAnswer = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'cs-CZ';
  u.rate = 0.85;
  u.pitch = 1.1;
  speechSynthesis.speak(u);
}

function speakTarget() {
  if (!currentTarget) return;
  speak(currentTarget.phoneme + '... ' + currentTarget.phoneme + '... ' + currentTarget.word);
}

function nextRound() {
  if (queue.length === 0) { showWin(); return; }
  canAnswer = false;
  currentTarget = queue.shift();
  round++;

  document.getElementById('round-num').textContent = round;
  document.getElementById('progress-fill').style.width = ((round - 1) / 26 * 100) + '%';
  document.getElementById('feedback').textContent = '';

  const decoy = getDecoy(currentTarget);
  const opts = shuffle([currentTarget, decoy]);

  ['btn0','btn1'].forEach((id, i) => {
    const btn = document.getElementById(id);
    btn.textContent = opts[i].letter;
    btn.dataset.letter = opts[i].letter;
    btn.className = 'letter-btn';
  });

  setTimeout(() => { speakTarget(); canAnswer = true; }, 400);
}

function getDecoy(target) {
  const pool = LETTERS.filter(l => l.letter !== target.letter);
  const similar = getSimilar(target.letter);
  const candidates = similar.length ? similar : pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function getSimilar(letter) {
  const groups = [
    ['B','D','P'],['M','N'],['C','G','O'],['F','E'],['I','J','L'],
    ['S','Z'],['T','I'],['U','V'],['K','X'],['A','H'],['R','K'],
  ];
  const group = groups.find(g => g.includes(letter));
  if (!group) return [];
  return group.filter(l => l !== letter).map(l => LETTERS.find(x => x.letter === l)).filter(Boolean);
}

function handleAnswer(chosenLetter) {
  if (!canAnswer) return;
  canAnswer = false;
  const btns = document.querySelectorAll('.letter-btn');
  const correct = chosenLetter === currentTarget.letter;

  btns.forEach(btn => {
    if (btn.dataset.letter === currentTarget.letter) btn.classList.add('correct');
    else if (btn.dataset.letter === chosenLetter && !correct) btn.classList.add('wrong');
  });

  if (correct) {
    score++;
    document.getElementById('score-val').textContent = score;
    document.getElementById('feedback').textContent = 'Výborně! 🌟';
    speak('Výborně! ' + currentTarget.letter + '... ' + currentTarget.word);
    launchConfetti();
    setTimeout(nextRound, 1800);
  } else {
    document.getElementById('feedback').textContent = 'Zkus znovu!';
    speak('Zkus to znovu. ' + currentTarget.phoneme);
    setTimeout(() => {
      btns.forEach(btn => btn.className = 'letter-btn');
      canAnswer = true;
      speakTarget();
    }, 1400);
  }
}

function launchConfetti() {
  const layer = document.getElementById('confetti-layer');
  const colors = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517'];
  for (let i = 0; i < 38; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (0.9 + Math.random() * 1.2) + 's';
    c.style.animationDelay = (Math.random() * 0.4) + 's';
    layer.appendChild(c);
    c.addEventListener('animationend', () => c.remove());
  }
}

function showWin() {
  document.getElementById('game').style.display = 'none';
  const ws = document.getElementById('win-screen');
  ws.style.display = 'flex';
  launchConfetti();
  setTimeout(launchConfetti, 600);
  speak('Výborně! Znáš všechna písmena abecedy!');
}

function init() {
  queue = shuffle(LETTERS);
  score = 0; round = 0;
  document.getElementById('score-val').textContent = '0';
  document.getElementById('round-num').textContent = '1';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('win-screen').style.display = 'none';
  nextRound();
}

document.getElementById('replay-btn').addEventListener('click', speakTarget);
document.getElementById('btn0').addEventListener('click', () => handleAnswer(document.getElementById('btn0').dataset.letter));
document.getElementById('btn1').addEventListener('click', () => handleAnswer(document.getElementById('btn1').dataset.letter));
document.getElementById('restart-btn').addEventListener('click', init);

init();
</script>
</body>
</html>
